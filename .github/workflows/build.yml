name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\HyperVGpuShareManager.sln

      - name: Build
        run: dotnet build .\HyperVGpuShareManager.sln -c Release --no-restore

      - name: Run basic tests
        run: dotnet run --project .\tests\HyperVGpuShareManager.Tests\HyperVGpuShareManager.Tests.csproj -c Release --no-build
